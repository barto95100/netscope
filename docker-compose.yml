services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netscope
      POSTGRES_USER: netscope
      POSTGRES_PASSWORD: netscope
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netscope"]
      interval: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream"]

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      API_PORT: "8080"
      DATABASE_URL: postgres://netscope:netscope@postgres:5432/netscope?sslmode=disable
      NATS_URL: nats://nats:4222
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    cap_add:
      - NET_RAW
    environment:
      DATABASE_URL: postgres://netscope:netscope@postgres:5432/netscope?sslmode=disable
      NATS_URL: nats://nats:4222
      REPOS_DIR: /data/repos
    volumes:
      - reposdata:/data/repos

volumes:
  pgdata:
  reposdata:
